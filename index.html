<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iris Wallet">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Iris Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>

<style>
:root {
  --sat: env(safe-area-inset-top, 44px);
  --sab: env(safe-area-inset-bottom, 34px);
  --bg: #000;
  --s1: rgba(255,255,255,0.04);
  --s2: rgba(255,255,255,0.07);
  --s3: rgba(255,255,255,0.12);
  --s4: rgba(255,255,255,0.18);
  --b1: rgba(255,255,255,0.08);
  --b2: rgba(255,255,255,0.14);
  --b3: rgba(255,255,255,0.22);
  --accent: #7B5CF0;
  --accent-mid: #9B7EF8;
  --accent-light: #C4B0FF;
  --accent-glow: rgba(123,92,240,0.35);
  --t1: #FFFFFF;
  --t2: rgba(255,255,255,0.58);
  --t3: rgba(255,255,255,0.32);
  --t4: rgba(255,255,255,0.16);
  --cr: 22px;
  --ca: 1.5867;
  --spring: cubic-bezier(0.34, 1.4, 0.64, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-wallet: cubic-bezier(0.32, 0.72, 0, 1);
}

*, *::before, *::after {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  outline: none;
  margin: 0; padding: 0;
}
input, textarea { -webkit-user-select: auto; user-select: auto; }

html { height: 100%; overscroll-behavior: none; overflow: hidden; }
body {
  width: 100vw; height: 100%;
  min-height: -webkit-fill-available;
  position: fixed; top: 0; left: 0;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--bg);
  color: var(--t1);
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  touch-action: pan-y;
}
button {
  font-family: inherit; cursor: pointer; border: none; background: none;
  -webkit-appearance: none; touch-action: manipulation;
}

.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.ambient-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; }
.orb1 {
  width: 50vw; height: 50vw; top: -15%; left: -10%;
  background: radial-gradient(circle, rgba(123,92,240,0.3) 0%, transparent 70%);
  animation: orbFloat1 9s ease-in-out infinite alternate;
}
.orb2 {
  width: 40vw; height: 40vw; bottom: 5%; right: -10%;
  background: radial-gradient(circle, rgba(0,210,255,0.12) 0%, transparent 70%);
  animation: orbFloat2 11s ease-in-out infinite alternate;
}
@keyframes orbFloat1 { from{transform:translate(0,0) scale(1)} to{transform:translate(24px,18px) scale(1.08)} }
@keyframes orbFloat2 { from{transform:translate(0,0) scale(1)} to{transform:translate(-18px,-24px) scale(1.12)} }

.app {
  display: flex; flex-direction: column;
  width: 100%; height: 100dvh; height: 100vh;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden; z-index: 1;
}

.header {
  flex-shrink: 0;
  padding: calc(var(--sat) + 14px) 22px 14px;
  display: flex; justify-content: space-between; align-items: center;
  position: relative; z-index: 100;
}
.header::after {
  content: ''; position: absolute; bottom: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(to right, transparent, var(--b2), transparent);
}
.wordmark {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 30%, var(--accent-light) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1;
}
.header-actions { display: flex; gap: 8px; align-items: center; }
.count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 26px; height: 26px; padding: 0 8px;
  background: var(--s3); border: 1px solid var(--b2);
  border-radius: 100px;
  font-size: 12px; font-weight: 700; color: var(--t1);
  font-family: 'Syne', sans-serif;
}
.key-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 14px;
  background: var(--s2); border: 1px solid var(--b2);
  border-radius: 100px; color: var(--t2);
  font-size: 12px; font-weight: 600;
  transition: all 0.2s var(--spring);
}
.key-btn:active { transform: scale(0.92); background: var(--s3); }
.key-btn svg { width: 13px; height: 13px; }
.add-btn {
  width: 38px; height: 38px;
  background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--spring);
}
.add-btn:active { transform: scale(0.86); }
.add-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }

.scroll-area {
  flex: 1; min-height: 0;
  overflow-y: scroll; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain; overscroll-behavior-x: none;
  scrollbar-width: none; touch-action: pan-y;
}
.scroll-area::-webkit-scrollbar { display: none; }

.stats-bar { padding: 24px 24px 4px; }
.stats-label { font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--t3); margin-bottom: 6px; }
.stats-sub { font-size: 13px; color: var(--t2); margin-top: 6px; }

/* APPLE WALLET STACK */
.wallet-stack {
  position: relative;
  padding: 20px 16px calc(var(--sab) + 110px);
  min-height: 100%;
}
.stack-card {
  position: relative;
  width: 100%;
  aspect-ratio: var(--ca);
  margin-bottom: -76%;
  transition:
    margin-bottom 0.65s var(--ease-wallet),
    transform 0.5s var(--ease-wallet),
    opacity 0.4s ease;
  will-change: transform, margin-bottom;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  cursor: pointer;
  contain: layout style;
}
.stack-card:last-child { margin-bottom: 0; }
.stack-card.appear { animation: cardAppear 0.55s var(--ease-out) both; }
@keyframes cardAppear {
  from { opacity: 0; transform: translateY(28px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.wallet-stack.expanded-mode .stack-card { margin-bottom: 14px; }
.wallet-stack.expanded-mode .stack-card:last-child { margin-bottom: 0; }
.stack-card.selected { z-index: 100; }

.card-scene {
  width: 100%; height: 100%;
  perspective: 1600px;
  -webkit-perspective: 1600px;
}
.card-flipper {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.45, 0.05, 0.25, 1);
  will-change: transform;
}
.stack-card.flipped .card-flipper { transform: rotateY(180deg); }

.card-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--cr);
  overflow: hidden;
  box-shadow:
    0 2px 0 0 rgba(255,255,255,0.08) inset,
    0 -1px 0 0 rgba(0,0,0,0.35) inset,
    0 20px 60px rgba(0,0,0,0.7),
    0 8px 20px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.10);
  -webkit-transform: translateZ(0);
}
.card-face.back {
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}

/* THEMES */
.theme-credit .card-face.front { background: linear-gradient(148deg,#090918 0%,#131340 45%,#1a1050 100%); }
.theme-credit .holo-layer { position:absolute; inset:0; z-index:1;
  background: linear-gradient(110deg, transparent 25%, rgba(123,92,240,0.08) 35%, rgba(0,200,255,0.06) 45%, rgba(255,100,200,0.05) 55%, transparent 65%);
  background-size: 300% 300%; animation: holoShift 6s ease-in-out infinite alternate;
}
.theme-credit .grid-layer { position:absolute; inset:0; z-index:0;
  background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 24px 24px;
}
@keyframes holoShift { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
.theme-aadhaar .card-face.front { background: linear-gradient(148deg,#003087 0%,#0050B3 55%,#0072CE 100%); }
.theme-aadhaar .deco-circle { position:absolute; top:-40%; right:-15%; width:90%; height:90%; border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 60%);
}
.theme-pan .card-face.front { background: linear-gradient(148deg,#F5EDD8 0%,#EAD9B8 100%); color: #1C1206; }
.theme-voter .card-face.front { background: linear-gradient(148deg,#14012B 0%,#2D1275 55%,#1A4068 100%); }
.theme-driving .card-face.front { background: linear-gradient(148deg,#0A2416 0%,#134A2C 55%,#1A6040 100%); }
.theme-passport .card-face.front { background: linear-gradient(148deg,#1F1B0E 0%,#3D2F0F 55%,#5C3E0A 100%); }
.theme-forex .card-face.front { background: linear-gradient(148deg,#0F1A2E 0%,#1B3060 55%,#3A5BA8 100%); }
.theme-evisa .card-face.front { background: linear-gradient(148deg,#15302E 0%,#1F5A50 55%,#3E9080 100%); }
.theme-flight .card-face.front { background: linear-gradient(148deg,#0B1A33 0%,#1F3A6B 55%,#3060A0 100%); }
.theme-train .card-face.front { background: linear-gradient(148deg,#2B0808 0%,#601818 55%,#A03030 100%); }
.theme-movie .card-face.front { background: linear-gradient(148deg,#1A0A1F 0%,#451050 55%,#8030A0 100%); }
.theme-generic .card-face.front { background: linear-gradient(148deg,#0D0D1E 0%,#1A1535 55%,#0E1A35 100%); }

.cf {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  padding: 20px 22px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.cf-top { display: flex; justify-content: space-between; align-items: flex-start; }
.cf-issuer { font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; opacity: 0.55; }
.cf-product { font-size: 13px; font-weight: 700; margin-top: 2px; opacity: 0.95; }
.cf-num {
  font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
  font-size: 15px; letter-spacing: 1.5px; font-weight: 600;
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px; word-break: break-all;
}
.cf-num-text { flex: 1; min-width: 0; }
.cf-bot { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
.cf-field { min-width: 0; }
.cf-flabel { font-size: 7.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 3px; }
.cf-fval { font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; word-break: break-word; }

.theme-pan .cf-issuer, .theme-pan .cf-product, .theme-pan .cf-num, .theme-pan .cf-fval { color: #2D1A04; }
.theme-pan .cf-flabel { color: #2D1A04; opacity: 0.5; }

.chip-wrap { margin-bottom: 2px; }

.cp-btn {
  padding: 6px 7px;
  background: rgba(255,255,255,0.18);
  border-radius: 8px;
  color: inherit; display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
  min-width: 24px; min-height: 24px;
}
.cp-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.86); }
.cp-btn svg { width: 12px; height: 12px; fill: currentColor; pointer-events: none; }
.theme-pan .cp-btn { background: rgba(0,0,0,0.12); }
.theme-pan .cp-btn:active { background: rgba(0,0,0,0.22); }

.tricolor {
  position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(to right, #FF9933 33.33%, #FFFFFF 33.33%, #FFFFFF 66.66%, #138808 66.66%);
  z-index: 3;
}

/* CARD BACK */
.cb {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  border-radius: var(--cr);
}
.cb-credit { background: linear-gradient(148deg,#0a0a18 0%,#161640 100%); }
.cb-magstripe {
  width: 100%; height: 42px; margin-top: 26px; flex-shrink: 0;
  background: linear-gradient(180deg, #000 0%, #1a1a1a 50%, #000 100%);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cb-body { flex: 1; padding: 14px 18px 14px; display: flex; flex-direction: column; gap: 10px; }
.cb-sigstrip {
  background: repeating-linear-gradient(-45deg, #f0f0f0, #f0f0f0 4px, #e8e8e8 4px, #e8e8e8 8px);
  border-radius: 4px; padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  height: 44px;
}
.cb-siglabel { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #444; }
.cb-sigsub { font-size: 9px; letter-spacing: 1px; color: #777; margin-top: 2px; font-style: italic; }
.cb-cvv-box {
  background: white; color: #000;
  padding: 5px 10px; border-radius: 3px;
  font-family: 'SF Mono', monospace; font-size: 14px; font-weight: 700; letter-spacing: 2px;
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  border: 1px solid rgba(0,0,0,0.08);
}
.cb-cvv-box .cp-btn { background: rgba(0,0,0,0.08); color: #000; }
.cb-info-row {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 8px 10px;
}
.cb-info-label { font-size: 7.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.cb-info-val { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.4; word-break: break-word; }
.cb-foot { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
.cb-bankname { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.cb-barcode { display: flex; align-items: flex-end; gap: 1.5px; height: 26px; opacity: 0.4; }
.cb-barcode span { background: white; border-radius: 1px; }

.cb-id { padding: 18px 18px 16px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
.cb-id-header { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.cb-id-field {
  display: flex; align-items: flex-start; gap: 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  padding: 8px 10px;
}
.cb-id-field-content { flex: 1; min-width: 0; }
.cb-id-label { font-size: 7.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 3px; }
.cb-id-val { font-size: 11.5px; font-weight: 500; line-height: 1.45; color: rgba(255,255,255,0.85); word-break: break-word; }
.cb-qr-placeholder {
  width: 50px; height: 50px;
  background: white; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; padding: 4px;
}

.cb-pan {
  background: linear-gradient(148deg,#F5EDD8 0%,#EAD9B8 100%);
  color: #2D1A04;
  padding: 18px; display: flex; flex-direction: column; gap: 10px;
}
.cb-pan .cb-id-header { color: #2D1A04; opacity: 0.5; border-bottom-color: rgba(45,26,4,0.15); }
.cb-pan .cb-id-field { background: rgba(45,26,4,0.06); }
.cb-pan .cb-id-label { color: #2D1A04; opacity: 0.55; }
.cb-pan .cb-id-val { color: #2D1A04; opacity: 0.9; }
.cb-pan-barcode { display: flex; align-items: flex-end; gap: 1.5px; height: 26px; opacity: 0.35; }
.cb-pan-barcode span { background: #2D1A04; border-radius: 1px; }
.cb-pan .cp-btn { background: rgba(45,26,4,0.12); }

/* TICKET FRONT */
.cf-ticket {
  position: relative; z-index: 2; width: 100%; height: 100%;
  padding: 16px 20px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.tk-top { display: flex; justify-content: space-between; align-items: flex-start; }
.tk-route { display: flex; align-items: center; gap: 14px; margin: 8px 0; }
.tk-loc { flex: 1; min-width: 0; }
.tk-code { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.tk-city { font-size: 9px; font-weight: 600; opacity: 0.55; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; word-break: break-word; }
.tk-arrow { opacity: 0.5; flex-shrink: 0; }
.tk-bot { display: flex; justify-content: space-between; gap: 8px; }
.tk-field { min-width: 0; flex: 1; }
.tk-flabel { font-size: 7px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.5; margin-bottom: 2px; }
.tk-fval { font-size: 11px; font-weight: 600; word-break: break-word; }

.card-actions {
  display: flex; gap: 8px;
  height: 0; overflow: hidden; opacity: 0;
  transition: height 0.45s var(--ease-wallet), opacity 0.3s ease, margin-top 0.45s var(--ease-wallet);
  margin-top: 0;
}
.stack-card.selected .card-actions {
  height: 40px; opacity: 1; margin-top: 10px;
}
.act-btn {
  flex: 1; height: 40px;
  background: var(--s2); border: 1px solid var(--b2); border-radius: 12px;
  font-size: 12px; font-weight: 600; color: var(--t2);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s var(--spring);
}
.act-btn:active { transform: scale(0.94); background: var(--s3); }
.act-btn.danger { color: #FF3B30; border-color: rgba(255,59,48,0.18); }
.act-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.empty {
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 40px; text-align: center; min-height: 50vh; justify-content: center;
}
.empty-icon {
  width: 76px; height: 76px;
  background: var(--s1); border: 1px solid var(--b1); border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 22px;
}
.empty-title { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--t2); line-height: 1.5; max-width: 250px; }

/* SHEET */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
  z-index: 2900; opacity: 0; pointer-events: none;
  transition: opacity 0.3s var(--ease-out);
}
.sheet-overlay.show { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(20,20,24,0.96); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border-top-left-radius: 24px; border-top-right-radius: 24px;
  padding: 14px 20px calc(var(--sab) + 18px);
  z-index: 3050; transform: translateY(100%);
  transition: transform 0.4s var(--ease-out), filter 0.3s ease, opacity 0.3s ease;
  border-top: 1px solid var(--b2);
}
.sheet.show { transform: translateY(0); }
.sheet.dimmed { filter: blur(4px) brightness(0.6); pointer-events: none; }
.sheet-grip { width: 38px; height: 4px; background: var(--s4); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 14px; }
.sheet-opt {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 14px;
  background: var(--s1); border: 1px solid var(--b1);
  border-radius: 14px; margin-bottom: 8px;
  text-align: left; color: var(--t1);
  transition: all 0.18s var(--spring);
}
.sheet-opt:active { transform: scale(0.97); background: var(--s2); }
.sheet-opt-icon {
  width: 38px; height: 38px; flex-shrink: 0;
  background: var(--s3); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.sheet-opt-icon svg { width: 18px; height: 18px; stroke: var(--accent-light); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.sheet-opt-body { flex: 1; min-width: 0; }
.sheet-opt-title { font-size: 14px; font-weight: 600; }
.sheet-opt-sub { font-size: 11px; color: var(--t2); margin-top: 2px; }

/* SCANNER */
.scanner {
  position: fixed; inset: 0; background: #000; z-index: 3000;
  display: flex; flex-direction: column;
  overflow: hidden; overscroll-behavior: none; touch-action: none;
  transform: translateY(100%);
  transition: transform 0.52s var(--ease-out);
  height: 100%; height: 100dvh;
}
.scanner.open { transform: translateY(0); }
.scanner-hdr {
  position: absolute; top: 0; left: 0; right: 0;
  padding: calc(var(--sat) + 14px) 20px 16px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.82), transparent);
}
.scanner-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
.close-btn {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.14); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: white; transition: all 0.2s;
}
.close-btn:active { transform: scale(0.86); background: rgba(255,255,255,0.25); }
.cam-view { flex: 1; position: relative; overflow: hidden; }
#videoEl { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-frame { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 5; }
.frame-box { width: 86%; aspect-ratio: var(--ca); position: relative; }
.corner { position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; border-width: 0; transition: filter 0.3s; }
.corner.tl { top:0;left:0; border-top-width:3px; border-left-width:3px; border-radius:7px 0 0 0; }
.corner.tr { top:0;right:0; border-top-width:3px; border-right-width:3px; border-radius:0 7px 0 0; }
.corner.bl { bottom:0;left:0; border-bottom-width:3px; border-left-width:3px; border-radius:0 0 0 7px; }
.corner.br { bottom:0;right:0; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 7px 0; }
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(to right, transparent, var(--accent) 30%, var(--accent-light) 50%, var(--accent) 70%, transparent);
  box-shadow: 0 0 10px var(--accent-glow), 0 0 2px var(--accent);
  border-radius: 1px; opacity: 0;
}
.sf-scanning .scan-line { opacity: 1; animation: scanBeam 2.2s linear infinite; }
.sf-processing .scan-line { opacity: 1; animation: scanBeam 0.6s linear infinite; }
.sf-processing .corner { filter: drop-shadow(0 0 10px var(--accent-mid)); animation: cornerPulse 0.45s ease-in-out infinite alternate; }
.sf-idle .scan-line { opacity: 0; animation: none; }
@keyframes scanBeam { 0%{top:0%} 100%{top:calc(100% - 2px)} }
@keyframes cornerPulse { from{opacity:0.5} to{opacity:1} }

.proc-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 20;
  opacity: 0; pointer-events: none; transition: opacity 0.3s var(--ease-out);
}
.proc-overlay.show { opacity: 1; pointer-events: all; }
.proc-ring {
  width: 54px; height: 54px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent); border-right-color: var(--accent-mid);
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.proc-text { font-size: 16px; font-weight: 600; color: white; }
.proc-sub { font-size: 12px; color: var(--t2); }
.flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 18; transition: opacity 0.25s; }

.scanner-bot {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 24px calc(var(--sab) + 22px);
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  z-index: 10;
}
.step-dots { display: flex; gap: 8px; align-items: center; }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: all 0.35s var(--spring); }
.sdot.active { background: var(--accent); width: 22px; border-radius: 3px; }
.sdot.done { background: var(--accent-light); opacity: 0.7; }
.scan-info { text-align: center; }
.scan-instr { font-size: 16px; font-weight: 600; }
.scan-sub-text { font-size: 12px; color: var(--t2); margin-top: 2px; }
.shutter {
  width: 70px; height: 70px;
  border-radius: 50%; border: 3px solid rgba(255,255,255,0.45);
  background: none; display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: transform 0.2s var(--spring);
}
.shutter:active { transform: scale(0.88); }
.shutter::before { content: ''; width: 54px; height: 54px; background: white; border-radius: 50%; transition: all 0.2s var(--spring); }
.shutter:active::before { width: 46px; height: 46px; }
.scanner-bot .skip-back-btn { font-size: 12px; color: var(--accent-light); padding: 6px 16px; }

input[type=file] { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }

.toast {
  position: fixed;
  bottom: calc(var(--sab) + 94px); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(30,30,36,0.92); backdrop-filter: blur(20px);
  border: 1px solid var(--b3); border-radius: 100px;
  padding: 11px 18px 11px 14px;
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  z-index: 9999; opacity: 0; pointer-events: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.55);
  transition: all 0.42s var(--spring);
  max-width: calc(100vw - 40px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.toast.success .toast-dot { background: #30D158; }
.toast.error .toast-dot { background: #FF3B30; }
.toast.info .toast-dot { background: var(--accent); }

.flip-hint {
  position: absolute; bottom: 11px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 0.3s 0.1s;
}
.stack-card.selected .flip-hint { opacity: 1; }
.flip-hint span { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.28); display: block; }
.flip-hint span.fh-active { background: rgba(255,255,255,0.65); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="ambient">

  <div class="ambient-orb orb2"></div>
</div>

<div class="app">
  <header class="header">

    <div class="header-actions">

<script>
'use strict';

const GEMINI_MODEL = 'gemini-2.5-flash';
const GEMINI_ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
const DB_NAME = 'IrisWalletV5';
const DB_VERSION = 1;

let db = null;
let camStream = null;
let scan = { step: 0, front: null, back: null };
let selectedId = null;
let toastTimer = null;
let lastTapTime = 0;
let lastTapId = null;

const $ = id => document.getElementById(id);
const scannerEl = $('scanner');
const videoEl = $('videoEl');
const snapCanvas = $('snapCanvas');
const scanFrame = $('scanFrame');
const procOverlay = $('procOverlay');
const flashEl = $('flashEl');
const walletStack = $('walletStack');
const countBadge = $('countBadge');
const scanTitle = $('scanTitle');
const scanInstr = $('scanInstr');
const scanSubText = $('scanSubText');
const shutterBtn = $('shutterBtn');
const skipBackBtn = $('skipBackBtn');

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('cards')) d.createObjectStore('cards', { keyPath: 'id' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
function txAll() {
  return new Promise((res, rej) => {
    const req = db.transaction('cards','readonly').objectStore('cards').getAll();
    req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
  });
}
function txAdd(card) {
  return new Promise((res, rej) => {
    const req = db.transaction('cards','readwrite').objectStore('cards').add(card);
    req.onsuccess = () => res(); req.onerror = () => rej(req.error);
  });
}
function txDel(id) {
  return new Promise((res, rej) => {
    const req = db.transaction('cards','readwrite').objectStore('cards').delete(id);
    req.onsuccess = () => res(); req.onerror = () => rej(req.error);
  });
}

function promptApiKey() {
  const cur = localStorage.getItem('iris_key') || '';
  const val = prompt('Gemini API Key:', cur);
  if (val === null) return;
  const k = val.trim();
  if (k) { localStorage.setItem('iris_key', k); toast('API key saved', 'success'); }
  else { localStorage.removeItem('iris_key'); toast('API key cleared', 'info'); }
}

function openAddSheet() {
  $('sheetOverlay').classList.add('show');
  $('addSheet').classList.add('show');
  $('addSheet').classList.remove('dimmed');
}
function closeAddSheet() {
  $('sheetOverlay').classList.remove('show');
  $('addSheet').classList.remove('show');
  $('addSheet').classList.remove('dimmed');
}

async function openScanner() {
  closeAddSheet();
  if (!localStorage.getItem('iris_key')) {
    toast('Set your Gemini API key first', 'error');
    setTimeout(promptApiKey, 800);
    return;
  }
  scan = { step: 0, front: null, back: null };
  refreshScanUI();
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    videoEl.srcObject = camStream;
    await videoEl.play().catch(() => {});
  } catch {
    toast('Camera access denied', 'error');
    return;
  }
  scannerEl.classList.add('open');
  setFrameState('scanning');
}
function closeScanner() {
  stopCam();
  scannerEl.classList.remove('open');
  setTimeout(() => setFrameState('idle'), 550);
  procOverlay.classList.remove('show');
  shutterBtn.disabled = false;
  shutterBtn.style.opacity = '';
  skipBackBtn.style.display = 'none';
}
function stopCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  videoEl.srcObject = null;
}
function setFrameState(state) {
  scanFrame.classList.remove('sf-idle','sf-scanning','sf-processing');
  scanFrame.classList.add('sf-' + state);
}

const SCAN_STEPS = [
  { title: 'Scan Front', instr: 'Position front of card', sub: 'Align within frame, then tap to capture' },
  { title: 'Scan Back', instr: 'Flip card — now scan the back', sub: 'Or skip if single-sided' },
  { title: 'Analyzing', instr: 'AI extracting all card details', sub: 'Please wait a few seconds...' },
];
function refreshScanUI() {
  const idx = Math.min(scan.step, 2);
  const s = SCAN_STEPS[idx];
  scanTitle.textContent = s.title;
  scanInstr.textContent = s.instr;
  scanSubText.textContent = s.sub;
  for (let i = 0; i < 3; i++) {
    const d = $('sd' + i);
    d.className = 'sdot';
    if (i === idx) d.classList.add('active');
    else if (i < idx) d.classList.add('done');
  }
  const isProc = idx === 2;
  shutterBtn.disabled = isProc;
  shutterBtn.style.opacity = isProc ? '0.3' : '';
  skipBackBtn.style.display = (idx === 1) ? 'block' : 'none';
}
function captureFrame() {
  if (!videoEl.videoWidth || !camStream) { toast('Camera not ready','error'); return; }
  shutterBtn.disabled = true;
  snapCanvas.width = videoEl.videoWidth;
  snapCanvas.height = videoEl.videoHeight;
  snapCanvas.getContext('2d').drawImage(videoEl, 0, 0);
  const imgData = snapCanvas.toDataURL('image/jpeg', 0.92);
  doFlash(() => {
    if (scan.step === 0) {
      scan.front = imgData; scan.step = 1;
      refreshScanUI(); setFrameState('scanning');
      toast('Front captured','success');
    } else {
      scan.back = imgData; scan.step = 2;
      refreshScanUI(); setFrameState('processing');
      runAI();
    }
  });
}
function skipBack() {
  if (scan.step !== 1) return;
  scan.back = null; scan.step = 2;
  refreshScanUI(); setFrameState('processing');
  runAI();
}
function doFlash(cb) {
  flashEl.style.opacity = '0.65';
  setTimeout(() => { flashEl.style.opacity = '0'; setTimeout(cb, 250); }, 60);
}

async function runAI() {
  setFrameState('processing');
  procOverlay.classList.add('show');
  shutterBtn.disabled = true;

  const key = localStorage.getItem('iris_key');
  const systemPrompt = `You are a precise OCR engine. I'm showing you a card or ID document (front${scan.back ? ' and back' : ' only'}).
Return ONLY a raw JSON object. Use null for missing fields. Extract the FULL visible card/ID number — do not mask it.

Schema:
{
  "type": "<one of: Credit Card | Debit Card | Forex Card | Aadhaar Card | PAN Card | Voter ID | Driving License | Passport | E-Visa | Other>",
  "product": "<specific product e.g. HDFC Regalia. If unknown, same as type>",
  "bank": "<bank or issuing authority>",
  "number": "<full primary number, exactly as visible>",
  "name": "<full name on card>",
  "dob": "<date of birth>",
  "expiry": "<expiry/valid until date>",
  "cvv": "<CVV/CVC if visible on back>",
  "address": "<address from back>",
  "back_info": "<other back info: blood group, emergency contact, nationality, sex, place of birth, etc>",
  "barcode_ref": "<reference/barcode/QR number if any>"
}`;

  const parts = [
    { text: systemPrompt },
    { text: '— FRONT —' },
    { inline_data: { mime_type: 'image/jpeg', data: scan.front.split(',')[1] } },
  ];
  if (scan.back) {
    parts.push({ text: '— BACK —' });
    parts.push({ inline_data: { mime_type: 'image/jpeg', data: scan.back.split(',')[1] } });
  }

  const body = {
    contents: [{ parts }],
    generationConfig: { temperature: 0.05, maxOutputTokens: 800, responseMimeType: "application/json" }
  };

  let retries = 3, data = null;
  try {
    while (retries > 0) {
      const res = await fetch(`${GEMINI_ENDPOINT}?key=${key}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.status === 503) {
        retries--;
        if (retries === 0) throw new Error("High demand. Please try again later.");
        const subText = procOverlay.querySelector('.proc-sub');
        if (subText) subText.textContent = `High demand, retrying... (${3 - retries})`;
        await new Promise(r => setTimeout(r, 2000)); continue;
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }
      data = await res.json(); break;
    }
    if (data?.candidates?.[0]?.finishReason === 'SAFETY')
      throw new Error('AI blocked the scan');
    const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!rawText) throw new Error('Empty AI response');
    const p = JSON.parse(rawText);
    const card = {
      id: Date.now(),
      kind: 'card',
      type: p.type || 'Card',
      product: p.product || p.type || 'Card',
      bank: p.bank || null,
      number: p.number || null,
      name: p.name || null,
      dob: p.dob || null,
      expiry: p.expiry || null,
      cvv: p.cvv || null,
      address: p.address || null,
      back_info: p.back_info || null,
      barcode_ref: p.barcode_ref || null,
      savedAt: new Date().toISOString()
    };
    await txAdd(card);
    closeScanner();
    await renderWallet();
    toast('Card secured successfully','success');
  } catch (err) {
    console.error('[Iris] AI error:', err);
    scan = { step: 0, front: null, back: null };
    setFrameState('scanning');
    procOverlay.classList.remove('show');
    const subText = procOverlay.querySelector('.proc-sub');
    if (subText) subText.textContent = 'Extracting all card details';
    refreshScanUI();
    toast('Error: ' + String(err.message).slice(0,55), 'error');
  }
}

// =====================================
// FIX 4: TICKET UPLOAD — sheet stays visible & blurred
// =====================================
function openTicketUpload() {
  if (!localStorage.getItem('iris_key')) {
    closeAddSheet();
    toast('Set your Gemini API key first', 'error');
    setTimeout(promptApiKey, 800);
    return;
  }
  // Don't close the sheet — just dim/blur it so it stays visible behind the picker
  $('addSheet').classList.add('dimmed');
  $('ticketFile').click();

  // If user cancels picker, restore the sheet via window focus
  const restore = () => {
    setTimeout(() => {
      if ($('addSheet').classList.contains('dimmed') && !scannerEl.classList.contains('open')) {
        $('addSheet').classList.remove('dimmed');
      }
    }, 400);
    window.removeEventListener('focus', restore);
  };
  window.addEventListener('focus', restore);
}

async function handleTicketUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) {
    $('addSheet').classList.remove('dimmed');
    return;
  }

  closeAddSheet();
  toast('Reading ticket...', 'info');

  try {
    let extractedText = '';
    let firstPageImage = null;

    if (file.type === 'application/pdf') {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const numPages = Math.min(pdf.numPages, 3);
      for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        extractedText += textContent.items.map(it => it.str).join(' ') + '\n';
      }
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      firstPageImage = canvas.toDataURL('image/jpeg', 0.85);
    } else if (file.type.startsWith('image/')) {
      firstPageImage = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result); r.onerror = rej;
        r.readAsDataURL(file);
      });
    } else {
      toast('Unsupported file type', 'error');
      return;
    }

    await processTicketAI(extractedText, firstPageImage);
  } catch (err) {
    console.error(err);
    toast('Ticket upload failed: ' + err.message.slice(0,50), 'error');
  }
}

async function processTicketAI(extractedText, imageData) {
  scannerEl.classList.add('open');
  setFrameState('processing');
  procOverlay.classList.add('show');
  procOverlay.querySelector('.proc-text').textContent = 'Iris AI Reading Ticket…';
  procOverlay.querySelector('.proc-sub').textContent = 'Creating digital pass';
  shutterBtn.disabled = true;
  shutterBtn.style.opacity = '0.3';

  const key = localStorage.getItem('iris_key');
  const systemPrompt = `You are a ticket/pass parser. Parse the ticket and return ONLY a raw JSON object.

Schema:
{
  "type": "<Flight Ticket | Train Ticket | Movie Ticket | E-Visa | Event Ticket | Bus Ticket | Other Pass>",
  "product": "<airline/operator/cinema name>",
  "passenger": "<passenger/holder name>",
  "pnr": "<PNR / booking reference>",
  "from_code": "<departure code (BLR etc) or venue code>",
  "from_city": "<departure city or venue name>",
  "to_code": "<arrival code or screen/hall>",
  "to_city": "<arrival city or movie/event name>",
  "depart_date": "<departure date>",
  "depart_time": "<departure time>",
  "arrive_date": "<arrival date>",
  "arrive_time": "<arrival time>",
  "seat": "<seat>",
  "class_or_category": "<class/coach/category>",
  "gate_or_terminal": "<gate/terminal/hall>",
  "extra_info": "<other key info>"
}`;

  const parts = [{ text: systemPrompt }];
  if (extractedText) parts.push({ text: '— EXTRACTED TEXT —\n' + extractedText.slice(0, 8000) });
  if (imageData) {
    parts.push({ text: '— DOCUMENT IMAGE —' });
    parts.push({ inline_data: { mime_type: 'image/jpeg', data: imageData.split(',')[1] } });
  }

  const body = {
    contents: [{ parts }],
    generationConfig: { temperature: 0.05, maxOutputTokens: 1000, responseMimeType: "application/json" }
  };

  try {
    const res = await fetch(`${GEMINI_ENDPOINT}?key=${key}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!rawText) throw new Error('Empty AI response');
    const p = JSON.parse(rawText);
    const ticket = {
      id: Date.now(),
      kind: 'ticket',
      type: p.type || 'Ticket',
      product: p.product || p.type || 'Ticket',
      passenger: p.passenger || null,
      pnr: p.pnr || null,
      from_code: p.from_code || null,
      from_city: p.from_city || null,
      to_code: p.to_code || null,
      to_city: p.to_city || null,
      depart_date: p.depart_date || null,
      depart_time: p.depart_time || null,
      arrive_date: p.arrive_date || null,
      arrive_time: p.arrive_time || null,
      seat: p.seat || null,
      class_or_category: p.class_or_category || null,
      gate_or_terminal: p.gate_or_terminal || null,
      extra_info: p.extra_info || null,
      savedAt: new Date().toISOString()
    };
    await txAdd(ticket);
    closeScanner();
    procOverlay.querySelector('.proc-text').textContent = 'Iris AI Scanning…';
    procOverlay.querySelector('.proc-sub').textContent = 'Extracting all card details';
    await renderWallet();
    toast('Pass added to wallet','success');
  } catch (err) {
    closeScanner();
    procOverlay.querySelector('.proc-text').textContent = 'Iris AI Scanning…';
    procOverlay.querySelector('.proc-sub').textContent = 'Extracting all card details';
    toast('Error: ' + String(err.message).slice(0,55), 'error');
  }
}

async function renderWallet() {
  const all = (await txAll()).sort((a,b) => b.id - a.id);
  const n = all.length;
  countBadge.textContent = n;
  walletStack.innerHTML = '';

  if (n === 0) {
    walletStack.classList.remove('expanded-mode');
    walletStack.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="3"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
        </div>
        <div class="empty-title">No cards yet</div>
        <div class="empty-sub">Tap <strong>+</strong> to scan a card or upload a ticket PDF</div>
      </div>`;
    return;
  }

  if (selectedId) walletStack.classList.add('expanded-mode');
  else walletStack.classList.remove('expanded-mode');

  all.forEach((card, idx) => {
    const el = buildCard(card);
    el.classList.add('appear');
    el.style.animationDelay = `${idx * 55}ms`;
    el.style.zIndex = (n - idx);
    walletStack.appendChild(el);
  });
}

function getTheme(item) {
  const t = String(item.type || '').toLowerCase();
  if (item.kind === 'ticket') {
    if (t.includes('flight')) return 'flight';
    if (t.includes('train') || t.includes('bus')) return 'train';
    if (t.includes('movie') || t.includes('event')) return 'movie';
    if (t.includes('visa')) return 'evisa';
    return 'flight';
  }
  if (t.includes('credit') || t.includes('debit')) return 'credit';
  if (t.includes('forex')) return 'forex';
  if (t.includes('aadhaar') || t.includes('aadhar')) return 'aadhaar';
  if (t.includes('pan')) return 'pan';
  if (t.includes('voter') || t.includes('election')) return 'voter';
  if (t.includes('driv') || t.includes('licen')) return 'driving';
  if (t.includes('passport')) return 'passport';
  if (t.includes('visa')) return 'evisa';
  return 'generic';
}

function isFinancialCard(type) {
  const t = String(type || '').toLowerCase();
  return t.includes('credit') || t.includes('debit') || t.includes('forex');
}

function copyButton(val, label) {
  if (!val) return '';
  return `<button class="cp-btn" data-copy="${escAttr(val)}" title="Copy ${label}" aria-label="Copy ${label}">
    <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
  </button>`;
}

function buildCard(item) {
  const el = document.createElement('div');
  el.className = 'stack-card';
  el.dataset.id = item.id;

  if (item.kind === 'ticket') el.innerHTML = buildTicketHTML(item);
  else el.innerHTML = buildIdCardHTML(item);

  el.addEventListener('click', e => {
    const copyBtn = e.target.closest('.cp-btn');
    if (copyBtn) {
      e.stopPropagation();
      copyVal(copyBtn.dataset.copy);
      return;
    }
    if (e.target.closest('.act-btn')) return;
    handleCardTap(item.id);
  });
  return el;
}

function formatCardNumber(num, isFinancial) {
  const clean = String(num).replace(/\s/g, '');
  if (isFinancial && clean.length >= 12) {
    return clean.replace(/(.{4})/g, '$1 ').trim();
  }
  return num;
}

function barcodeLines(n, dark) {
  const pat = [100,68,85,55,92,72,100,60,80,95,65,100,70,85,58,90,75,100,52,80];
  return Array.from({length:n}, (_,i) => {
    const h = pat[i % pat.length];
    const w = (i % 3 === 0) ? 2.5 : 1.5;
    return `<span style="height:${h}%;width:${w}px;background:${dark ? '#2D1A04' : 'white'};border-radius:1px;display:block"></span>`;
  }).join('');
}

  const backHTML = `<div class="cb" style="background:linear-gradient(148deg,#1a1a2a 0%,#0a0a18 100%)">
    <div class="cb-id">
      <div class="cb-id-header">${escH(t.product || t.type || 'Pass')} — Booking Details</div>
      ${t.passenger ? `<div class="cb-id-field"><div class="cb-id-field-content"><div class="cb-id-label">Passenger</div><div class="cb-id-val">${escH(t.passenger)}</div></div>${copyButton(t.passenger, 'name')}</div>` : ''}
      ${t.class_or_category ? `<div class="cb-id-field"><div class="cb-id-field-content"><div class="cb-id-label">Class</div><div class="cb-id-val">${escH(t.class_or_category)}</div></div></div>` : ''}
      ${t.gate_or_terminal ? `<div class="cb-id-field"><div class="cb-id-field-content"><div class="cb-id-label">${isMovie ? 'Hall' : 'Gate / Terminal'}</div><div class="cb-id-val">${escH(t.gate_or_terminal)}</div></div></div>` : ''}
      ${t.arrive_date ? `<div class="cb-id-field"><div class="cb-id-field-content"><div class="cb-id-label">Arrival</div><div class="cb-id-val">${escH(t.arrive_date)}${t.arrive_time ? ' · ' + escH(t.arrive_time) : ''}</div></div></div>` : ''}
      ${t.extra_info ? `<div class="cb-id-field"><div class="cb-id-field-content"><div class="cb-id-label">Info</div><div class="cb-id-val">${escH(t.extra_info)}</div></div></div>` : ''}
      <div style="margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;gap:10px">
        <div class="cb-qr-placeholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="#0a0a18">
            <path d="M3 3h7v7H3V3zm1 1v5h5V4H4zm1 1h3v3H5V5zm8-2h7v7h-7V3zm1 1v5h5V4h-5zm1 1h3v3h-3V5zM3 13h7v7H3v-7zm1 1v5h5v-5H4zm1 1h3v3H5v-3zm8 0h2v2h-2v-2zm0 4h2v2h-2v-2zm3-4h2v2h-2v-2zm-1 2h2v2h-2v-2zm2 2h2v2h-2v-2zm-4 0h2v2h-2v-2z"/>
          </svg>
        </div>
        <div class="cb-barcode">${barcodeLines(22, false)}</div>
      </div>
    </div>
  </div>`;

  const flipSVG = `<svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;
  const delSVG = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/></svg>`;

  return `
    <div class="card-scene">
      <div class="card-flipper" id="flip-${t.id}">
        ${frontHTML}
        <div class="card-face back">${backHTML}</div>
      </div>
      <div class="flip-hint"><span class="fh-active"></span><span></span></div>
    </div>
    <div class="card-actions">
      <button class="act-btn" onclick="flipCard(${t.id},event)">${flipSVG} Flip</button>
      <button class="act-btn danger" onclick="deleteCard(${t.id},event)">${delSVG} Delete</button>
    </div>`;
}

// =====================================
// FIX 2: SMOOTH INTERACTIONS
// =====================================
function handleCardTap(id) {
  const now = Date.now();
  const isDoubleTap = (lastTapId === id) && (now - lastTapTime < 320);
  lastTapTime = now;
  lastTapId = id;

  const el = document.querySelector(`.stack-card[data-id="${id}"]`);
  if (!el) return;

  if (isDoubleTap) {
    flipCard(id);
    return;
  }

  if (selectedId === id) {
    deselectCard();
    return;
  }

  if (selectedId) {
    const prev = document.querySelector(`.stack-card[data-id="${selectedId}"]`);
    if (prev) {
      prev.classList.remove('selected', 'flipped');
      const pf = prev.querySelector('.card-flipper');
      if (pf) pf.style.transform = '';
    }
  }

  el.classList.add('selected');
  selectedId = id;
  walletStack.classList.add('expanded-mode');

  // Smooth scroll only after spread animation is well underway
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 350);
}

function deselectCard() {
  if (!selectedId) return;
  const el = document.querySelector(`.stack-card[data-id="${selectedId}"]`);
  if (el) {
    el.classList.remove('selected', 'flipped');
    const f = el.querySelector('.card-flipper');
    if (f) f.style.transform = '';
  }
  selectedId = null;
  walletStack.classList.remove('expanded-mode');
}

function flipCard(id, e) {
  if (e) e.stopPropagation();
  const el = document.querySelector(`.stack-card[data-id="${id}"]`);
  if (!el) return;
  if (selectedId !== id) {
    if (selectedId) {
      const prev = document.querySelector(`.stack-card[data-id="${selectedId}"]`);
      if (prev) {
        prev.classList.remove('selected', 'flipped');
        const pf = prev.querySelector('.card-flipper');
        if (pf) pf.style.transform = '';
      }
    }
    el.classList.add('selected');
    selectedId = id;
    walletStack.classList.add('expanded-mode');
  }

  el.classList.toggle('flipped');
  const isFlipped = el.classList.contains('flipped');
  const flipper = el.querySelector('.card-flipper');
  if (flipper) flipper.style.transform = isFlipped ? 'rotateY(180deg)' : '';

  const dots = el.querySelectorAll('.flip-hint span');
  if (dots.length === 2) {
    dots[0].classList.toggle('fh-active', !isFlipped);
    dots[1].classList.toggle('fh-active', isFlipped);
  }
}

async function deleteCard(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Permanently delete this item?')) return;
  const el = document.querySelector(`.stack-card[data-id="${id}"]`);
  if (el) {
    el.style.transition = 'all 0.3s ease';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.88) translateY(-8px)';
  }
  setTimeout(async () => {
    await txDel(id);
    if (selectedId === id) selectedId = null;
    await renderWallet();
    toast('Item deleted', 'info');
  }, 280);
}

async function copyVal(text) {
  if (!text || text === 'null' || text === 'undefined') {
    toast('Nothing to copy', 'error');
    return;
  }
  const str = String(text);
  let success = false;

  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(str);
      success = true;
    }
  } catch (e) {
    success = false;
  }

  if (!success) {
    try {
      const ta = document.createElement('textarea');
      ta.value = str;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.opacity = '0';
      ta.style.pointerEvents = 'none';
      document.body.appendChild(ta);
      const range = document.createRange();
      range.selectNodeContents(ta);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      ta.setSelectionRange(0, ta.value.length);
      success = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (e) {
      success = false;
    }
  }

  if (success) toast('Copied to clipboard', 'success');
  else toast('Copy failed', 'error');
}

function toast(msg, type = 'info') {
  if (toastTimer) clearTimeout(toastTimer);
  const el = $('toast');
  $('toastMsg').textContent = msg;
  el.className = `toast ${type} show`;
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function escH(s) {
  if (s === null || s === undefined || s === 'null') return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escAttr(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
$('scrollArea').addEventListener('touchmove', e => {
  const el = $('scrollArea');
  const canDown = el.scrollTop < (el.scrollHeight - el.clientHeight);
  const canUp = el.scrollTop > 0;
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (!el._touchStartY) el._touchStartY = t.clientY;
    const dy = t.clientY - el._touchStartY;
    if ((!canUp && dy > 0) || (!canDown && dy < 0)) e.preventDefault();
  }
}, { passive: false });
$('scrollArea').addEventListener('touchstart', e => {
  if (e.touches.length === 1) $('scrollArea')._touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (scannerEl.classList.contains('open')) closeScanner();
    if (selectedId) deselectCard();
  }
});
$('scrollArea').addEventListener('click', e => {
  if (!selectedId) return;
  if (!e.target.closest('.stack-card')) deselectCard();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.warn('[Iris] SW failed:', err));
}

(async () => {
  try {
    db = await openDB();
    await renderWallet();
  } catch (err) {
    console.error('[Iris] Boot:', err);
    toast('Startup error — refresh the app', 'error');
  }
})();
</script>
