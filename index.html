<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Iris Wallet">
    <title>Iris Wallet</title>
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-surface: #1c1c1e;
            --ios-accent: #5A32FA;
            --ios-text: #ffffff;
            --ios-text-secondary: #8e8e93;
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }

        /* 1. NATIVE LOCKDOWN */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--ios-bg); color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden; position: fixed; touch-action: none;
        }

        .app-shell {
            display: flex; flex-direction: column; width: 100%; height: 100%;
        }

        /* 2. PREMIUM HEADER */
        .header {
            padding: calc(var(--safe-top) + 12px) 24px 12px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }

        .header h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -1.2px; }

        .header-actions { display: flex; gap: 14px; }
        .icon-btn {
            background: var(--ios-surface); border: none; color: var(--ios-accent);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .icon-btn:active { transform: scale(0.88); opacity: 0.7; }

        /* 3. WALLET STACK */
        .scroll-container {
            flex: 1; overflow-y: scroll; overflow-x: hidden;
            padding: 20px 20px 120px; -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .wallet-stack { display: flex; flex-direction: column; width: 100%; position: relative; }

        .card-wrapper {
            position: relative; width: 100%; margin-bottom: -145px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            perspective: 1500px; z-index: var(--zi);
        }

        .card-wrapper.active { margin-bottom: 24px; transform: translateY(-12px) scale(1.03); z-index: 1000 !important; }
        .card-wrapper.active ~ .card-wrapper { transform: translateY(220px); }

        /* 4. 3D FLIP MECHANICS */
        .card-inner {
            width: 100%; aspect-ratio: 1.586; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 22px; box-shadow: 0 12px 45px rgba(0,0,0,0.8);
        }

        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 22px;
            padding: 24px; display: flex; flex-direction: column;
            justify-content: space-between; border: 1px solid rgba(255,255,255,0.14);
            overflow: hidden;
        }

        .card-back { transform: rotateY(180deg); background: #1c1c1e; }

        /* THEMES */
        .theme-pan { background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); color: #1c1c1e; }
        .theme-aadhar { background: #ffffff; color: #1c1c1e; border-top: 10px solid #E43D30; }
        .theme-credit { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); color: #ffffff; }
        .theme-voter { background: linear-gradient(135deg, #5f2c82 0%, #49a09d 100%); color: #ffffff; }
        .theme-generic { background: #2c2c2e; color: #ffffff; }

        /* CARD ELEMENTS */
        .card-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-type-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 2.2px; opacity: 0.65; }
        
        .card-number-display {
            font-family: "SF Mono", "Menlo", monospace; font-size: 26px; letter-spacing: 4px;
            display: flex; align-items: center; gap: 14px; justify-content: center;
        }
        
        .copy-btn {
            background: rgba(255,255,255,0.18); border: none; padding: 7px;
            border-radius: 10px; cursor: pointer; color: inherit; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .copy-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }

        .card-info-group { display: flex; flex-direction: column; gap: 5px; }
        .info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.55; letter-spacing: 0.6px; }
        .info-value { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        /* 5. MODERN SCANNER */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000;
            display: none; flex-direction: column; padding: var(--safe-top) 24px;
        }
        .overlay.active { display: flex; animation: iosPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes iosPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .scanner-instruction { text-align: center; font-size: 24px; font-weight: 700; margin: 30px 0; color: #fff; letter-spacing: -0.5px; }
        
        .camera-trigger {
            width: 86px; height: 86px; border-radius: 50%; border: 4px solid #fff;
            margin: auto auto 60px; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .camera-trigger div { width: 68px; height: 68px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
        .camera-trigger:active div { transform: scale(0.85); }

        /* 6. DYNAMIC ISLAND NOTIFICATION */
        .status-pill {
            position: fixed; top: calc(var(--safe-top) + 10px); left: 50%; transform: translateX(-50%) translateY(-120px);
            background: rgba(30, 30, 32, 0.9); color: #fff; padding: 12px 28px;
            border-radius: 40px; font-weight: 600; text-align: center;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 6000; font-size: 14px; border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; align-items: center; gap: 12px; opacity: 0;
            pointer-events: none;
        }
        .status-pill.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
        .status-pill.error { border-color: rgba(255, 59, 48, 0.4); }
        .status-pill.success { border-color: rgba(90, 50, 250, 0.4); }

        #videoViewfinder { width: 100%; height: 100%; object-fit: cover; }
        .dot { width: 8px; height: 8px; background: var(--ios-accent); border-radius: 50%; }
        .dot.pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="header">
            <h1>Iris Wallet</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleKey()">🔑</button>
                <button class="icon-btn" onclick="startScanning()">＋</button>
            </div>
        </header>

        <div class="scroll-container" id="scrollContainer">
            <div id="walletStack" class="wallet-stack"></div>
        </div>
    </div>

    <div id="scannerOverlay" class="overlay">
        <div style="display:flex; justify-content: flex-end;">
            <button class="icon-btn" onclick="closeScanner()" style="background:none; font-size: 32px;">✕</button>
        </div>
        <div id="scanStepText" class="scanner-instruction">Scan Front of Card</div>
        
        <div style="flex:1; display:flex; justify-content:center; align-items:center;">
            <div id="scanPreview" style="width:100%; aspect-ratio:1.586; border: 3px solid var(--ios-accent); border-radius:24px; background: #000; display:flex; align-items:center; justify-content:center; overflow:hidden; position: relative; box-shadow: 0 0 40px rgba(90, 50, 250, 0.4);">
                <video id="videoViewfinder" autoplay playsinline muted></video>
                <canvas id="snapshotCanvas" style="display:none;"></canvas>
            </div>
        </div>

        <div class="camera-trigger" onclick="captureSnapshot()">
            <div></div>
        </div>
    </div>

    <div id="statusPill" class="status-pill">
        <div class="dot pulse" id="statusDot"></div>
        <span id="statusText">Processing...</span>
    </div>

    <script>
        const statusPill = document.getElementById('statusPill');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const walletStack = document.getElementById('walletStack');
        const scannerOverlay = document.getElementById('scannerOverlay');
        const scanStepText = document.getElementById('scanStepText');
        const video = document.getElementById('videoViewfinder');
        const canvas = document.getElementById('snapshotCanvas');

        let db;
        let scanSession = { step: 0, front: null, back: null };
        let activeCardId = null;
        let stream = null;

        // 1. DB INIT
        const req = indexedDB.open("IrisWalletV3", 1);
        req.onupgradeneeded = e => { e.target.result.createObjectStore("cards", { keyPath: "id" }); };
        req.onsuccess = e => { db = e.target.result; renderWallet(); };

        // 2. KEY LOGIC
        function toggleKey() {
            const currentKey = localStorage.getItem('iris_key');
            const key = prompt("Enter Gemini API Key (April 2026 Update):", currentKey || "");
            if(key !== null) {
                localStorage.setItem('iris_key', key.trim());
                showStatus("Gemini Model Connected", "success");
            }
        }

        // 3. SCANNING
        async function startScanning() {
            if(!localStorage.getItem('iris_key')) return toggleKey();
            scanSession = { step: 0, front: null, back: null };
            scanStepText.innerText = "Scan Front of Card";
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                scannerOverlay.classList.add('active');
            } catch (err) {
                showStatus("Enable Camera Permissions", "error");
            }
        }

        function closeScanner() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            scannerOverlay.classList.remove('active');
        }

        function captureSnapshot() {
            if (!video.videoWidth) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const data = canvas.toDataURL('image/jpeg', 0.9);

            if(scanSession.step === 0) {
                scanSession.front = data;
                scanSession.step = 1;
                scanStepText.innerText = "Scan Back of Card";
                showStatus("Front Captured", "success");
            } else {
                scanSession.back = data;
                processCard();
            }
        }

        async function processCard() {
            const front = scanSession.front;
            const back = scanSession.back;
            closeScanner();
            showStatus("Iris AI Extracting Data...", "processing");
            
            const key = localStorage.getItem('iris_key');
            try {
                // UPDATE: Using the April 2026 stable Flash-Lite endpoint
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract card data. Return ONLY JSON. Keys: type(PAN Card, Aadhar Card, Credit Card, Voter ID, ID Card), number, name, dob, expiry. If missing use NULL." },
                                { inline_data: { mime_type: "image/jpeg", data: front.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                let raw = data.candidates[0].content.parts[0].text;
                raw = raw.replace(/```json|```/g, '').trim();
                const parsed = JSON.parse(raw);

                const newCard = { id: Date.now(), ...parsed, frontImg: front, backImg: back };
                const tx = db.transaction("cards", "readwrite");
                tx.objectStore("cards").add(newCard);
                tx.oncomplete = () => { showStatus("Card Secured", "success"); renderWallet(); };
            } catch (err) {
                showStatus("AI Error: " + err.message, "error");
            }
        }

        // 4. RENDERING
        function renderWallet() {
            walletStack.innerHTML = '';
            const tx = db.transaction("cards", "readonly");
            tx.objectStore("cards").getAll().onsuccess = e => {
                const cards = e.target.result.sort((a,b) => b.id - a.id);
                if(cards.length === 0) {
                    walletStack.innerHTML = `<div style="text-align:center; padding-top:140px; color:var(--ios-text-secondary); font-size:17px; font-weight:600;">Secure Your Digital Identity<br><span style="font-size:14px; opacity:0.6; font-weight:400;">Tap ＋ to scan your first card.</span></div>`;
                    return;
                }
                cards.forEach((c, idx) => {
                    const theme = getThemeClass(c.type);
                    const el = document.createElement('div');
                    el.className = 'card-wrapper';
                    el.style.setProperty('--zi', cards.length - idx);
                    el.innerHTML = `
                        <div class="card-inner" onclick="handleCardClick(this, ${c.id})">
                            <div class="card-front ${theme}">
                                <div class="card-row"><div class="card-type-label">${c.type}</div><div style="font-size:24px; opacity:0.8;">✦</div></div>
                                <div class="card-number-display">${c.number || '•••• •••• ••••'}<button class="copy-btn" onclick="copyText('${c.number}', event)">📋</button></div>
                                <div class="card-row">
                                    <div class="card-info-group"><div class="info-label">Card Holder</div><div class="info-value">${c.name || 'CITIZEN'}<button class="copy-btn" onclick="copyText('${c.name}', event)">📋</button></div></div>
                                    <div class="card-info-group" style="text-align:right"><div class="info-label">Expiry / DOB</div><div class="info-value">${c.expiry || c.dob || '--/--'}</div></div>
                                </div>
                                <div onclick="deleteCard(${c.id}, event)" style="position:absolute; bottom:14px; right:16px; opacity:0.4; font-size:11px; font-weight:800; letter-spacing:0.8px;">✕ REMOVE</div>
                            </div>
                            <div class="card-back" style="background-image:url(${c.backImg}); background-size:cover; background-position:center;">
                                <div style="background:rgba(0,0,0,0.55); width:100%; height:100%; padding:24px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                                    <div class="card-type-label" style="color:white; margin-bottom:12px;">Back Side Analysis</div>
                                    <div style="font-size:13px; opacity:0.8; font-weight:500;">Press & hold to flip back</div>
                                </div>
                            </div>
                        </div>
                    `;
                    walletStack.appendChild(el);
                });
            };
        }

        function handleCardClick(inner, id) {
            const wrap = inner.parentElement;
            if(wrap.classList.contains('active')) {
                if(activeCardId === id) wrap.classList.toggle('flipped');
                else activeCardId = id;
            } else {
                document.querySelectorAll('.card-wrapper').forEach(w => w.classList.remove('active', 'flipped'));
                wrap.classList.add('active');
                activeCardId = id;
            }
        }

        function deleteCard(id, e) {
            e.stopPropagation();
            if(!confirm("Delete permanently?")) return;
            const tx = db.transaction("cards", "readwrite");
            tx.objectStore("cards").delete(id);
            tx.oncomplete = () => { showStatus("Card Erased", "success"); renderWallet(); };
        }

        function getThemeClass(type) {
            const t = String(type).toLowerCase();
            if(t.includes('pan')) return 'theme-pan';
            if(t.includes('aadhar')) return 'theme-aadhar';
            if(t.includes('credit')) return 'theme-credit';
            if(t.includes('voter')) return 'theme-voter';
            return 'theme-generic';
        }

        function copyText(text, e) {
            e.stopPropagation();
            const el = document.createElement('textarea');
            el.value = text;
            el.setAttribute('readonly', '');
            el.style.position = 'fixed'; el.style.opacity = '0';
            document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showStatus("Copied to Clipboard", "success");
        }

        function showStatus(msg, type = "processing") {
            statusText.innerText = msg;
            statusPill.className = "status-pill visible " + type;
            statusDot.className = "dot " + (type === "processing" ? "pulse" : "");
            if (type !== "processing") setTimeout(() => statusPill.classList.remove('visible'), 3000);
        }

        document.addEventListener('touchmove', e => { if (!e.target.closest('#scrollContainer')) e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
