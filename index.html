<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Iris Wallet</title>

<style>
:root {
    --bg: #000;
    --card: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
    --text-secondary: #8E8E93;
    --primary: #0A84FF;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont;
    overflow-x: hidden;
}

/* Layout */
.app {
    height: 100%;
    overflow-y: auto;
    padding-bottom: 100px;
}

/* Header */
.header {
    position: sticky;
    top: 0;
    padding: 20px;
    padding-top: calc(env(safe-area-inset-top) + 10px);
    backdrop-filter: blur(30px);
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 {
    margin: 0;
    font-size: 30px;
}

/* Add Button */
.add {
    width: 40px;
    height: 40px;
    border-radius: 20px;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    position: relative;
}

.add input {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
}

/* Cards */
.wallet {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Card Flip */
.card {
    width: 100%;
    aspect-ratio: 1.6;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: 0.6s;
    transform-style: preserve-3d;
}

.inner.flipped {
    transform: rotateY(180deg);
}

.face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    padding: 20px;
    background: var(--card);
    backdrop-filter: blur(30px);
    border: 1px solid var(--border);
    backface-visibility: hidden;
}

.back {
    transform: rotateY(180deg);
}

.title {
    font-size: 13px;
    opacity: 0.7;
}

.number {
    font-size: 22px;
    margin: 15px 0;
}

.field {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.copy {
    background: none;
    border: none;
    color: var(--primary);
    font-size: 14px;
}

/* Status */
.status {
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>Iris</h1>
        <div class="add">
            +
            <input type="file" accept="image/*" capture="environment" id="camera">
        </div>
    </div>

    <div class="status" id="status"></div>

    <div class="wallet" id="wallet"></div>

</div>

<script>
const camera = document.getElementById('camera');
const wallet = document.getElementById('wallet');
const statusText = document.getElementById('status');

let captureStep = 'front';
let temp = {};
let db;

/* DB */
const req = indexedDB.open("iris", 1);
req.onupgradeneeded = e => {
    e.target.result.createObjectStore("cards", { keyPath: "id" });
};
req.onsuccess = e => {
    db = e.target.result;
    load();
};

/* Capture Flow */
camera.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;

    if (captureStep === 'front') {
        temp.front = file;
        captureStep = 'back';
        statusText.innerText = "Capture back side";
        return;
    }

    temp.back = file;
    captureStep = 'front';
    processCard();
});

/* Gemini OCR */
async function processCard() {
    statusText.innerText = "Analyzing...";

    const key = localStorage.getItem("gemini");
    if (!key) {
        const k = prompt("Enter Gemini API key");
        localStorage.setItem("gemini", k);
    }

    const frontBase64 = await toBase64(temp.front);

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${localStorage.getItem("gemini")}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            contents: [{
                parts: [
                    {
                        text: `
Extract all fields from this ID.

Return JSON:
{
"type":"",
"number":"",
"name":"",
"dob":"",
"gender":"",
"address":"",
"expiry":""
}
`
                    },
                    {
                        inline_data: {
                            mime_type: "image/jpeg",
                            data: frontBase64
                        }
                    }
                ]
            }]
        })
    });

    const data = await res.json();
    let json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g,''));

    const card = {
        id: Date.now(),
        ...json,
        front: await toBase64(temp.front),
        back: await toBase64(temp.back),
        flipped: false
    };

    save(card);
}

/* Helpers */
function toBase64(file) {
    return new Promise(r => {
        const fr = new FileReader();
        fr.onload = () => r(fr.result.split(',')[1]);
        fr.readAsDataURL(file);
    });
}

/* Save */
function save(card) {
    const tx = db.transaction("cards", "readwrite");
    tx.objectStore("cards").add(card);
    tx.oncomplete = load;
}

/* Load */
function load() {
    wallet.innerHTML = "";
    const tx = db.transaction("cards", "readonly");
    tx.objectStore("cards").getAll().onsuccess = e => {
        e.target.result.reverse().forEach(render);
    };
}

/* Render */
function render(c) {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
    <div class="inner ${c.flipped ? 'flipped' : ''}">
        
        <div class="face">
            <div class="title">${c.type}</div>
            <div class="number">${c.number}</div>

            ${field("Name", c.name)}
            ${field("DOB", c.dob)}
            ${field("Gender", c.gender)}

        </div>

        <div class="face back">
            <img src="data:image/jpeg;base64,${c.back}" style="width:100%; height:100%; object-fit:cover; border-radius:20px;">
        </div>

    </div>
    `;

    el.onclick = () => flip(c.id);
    wallet.appendChild(el);
}

function field(label, value) {
    if (!value) return "";
    return `
    <div class="field">
        <span>${value}</span>
        <button class="copy" onclick="copy(event, '${value}')">Copy</button>
    </div>`;
}

/* Flip */
function flip(id) {
    const tx = db.transaction("cards", "readwrite");
    const store = tx.objectStore("cards");
    const r = store.get(id);

    r.onsuccess = () => {
        const d = r.result;
        d.flipped = !d.flipped;
        store.put(d);
        load();
    };
}

/* Copy */
function copy(e, text) {
    e.stopPropagation();
    navigator.clipboard.writeText(text);
    statusText.innerText = "Copied";
    setTimeout(()=>statusText.innerText="",1000);
}
</script>

</body>
</html>
