<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Iris">
    <title>Iris Wallet</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        /* 1. NATIVE APP LOCKDOWN - Prevents bouncing and horizontal scrolling */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000; color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden; /* Stops whole page from moving */
            overscroll-behavior-y: none; /* Stops pull-to-refresh bounce */
            position: fixed; /* Locks the body entirely */
        }

        /* 2. SCROLLABLE CONTAINER */
        .app-container {
            width: 100%; height: 100%;
            overflow-y: auto; /* Only this container scrolls */
            -webkit-overflow-scrolling: touch; /* Smooth iOS scrolling */
            padding-bottom: 50px;
        }

        .header {
            padding: calc(env(safe-area-inset-top, 47px) + 20px) 24px 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 34px; font-weight: 700; }

        .add-btn-container { position: relative; }
        .add-btn {
            background: #1C1C1E; color: #5A32FA;
            width: 36px; height: 36px; border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: 500; cursor: pointer;
        }
        input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .content { padding: 24px; }
        #status { font-size: 15px; color: #8E8E93; text-align: center; margin-bottom: 20px; min-height: 20px; }

        /* 3. PHYSICAL-TO-DIGITAL CARD DESIGN */
        .wallet-card {
            width: 100%;
            aspect-ratio: 1.586; /* Exact Credit Card aspect ratio */
            border-radius: 16px;
            margin-bottom: 20px;
            background-color: #1C1C1E;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Frosted glass label for the card type */
        .card-label {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; color: white;
        }

        .btn-primary {
            background: #5A32FA; color: white; width: 100%; padding: 16px;
            border-radius: 14px; font-size: 17px; font-weight: 600; border: none;
            margin-top: 20px; margin-bottom: 40px; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Iris</h1>
            <div class="add-btn-container">
                <div class="add-btn">+</div>
                <input type="file" accept="image/*" capture="environment" id="cameraInput">
            </div>
        </div>

        <div class="content">
            <div id="status"></div>
            
            <div id="previewSection" style="display:none;">
                <h3 style="margin-top:0; color:#8E8E93; font-size: 14px;">PREVIEW</h3>
                <div id="previewCardContainer"></div>
                <button id="saveBtn" class="btn-primary">Save to Iris Wallet</button>
            </div>

            <div id="walletContainer"></div>
        </div>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const statusText = document.getElementById('status');
        const previewSection = document.getElementById('previewSection');
        const previewCardContainer = document.getElementById('previewCardContainer');
        const saveBtn = document.getElementById('saveBtn');
        const walletContainer = document.getElementById('walletContainer');

        let currentImageData = null;
        let currentCardType = "Scanned Card";

        // --- DATABASE SETUP (IndexedDB) ---
        // This is a secure, local, high-capacity database on your iPhone
        let db;
        const request = indexedDB.open("IrisDB", 1);
        
        request.onupgradeneeded = function(event) {
            db = event.target.result;
            // Create a table called 'cards'
            db.createObjectStore("cards", { keyPath: "id" }); 
        };
        
        request.onsuccess = function(event) {
            db = event.target.result;
            loadCardsFromDB(); // Load wallet on startup
        };

        // --- CAMERA AND SCANNING ---
        cameraInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusText.innerText = "Processing image...";
            previewSection.style.display = 'none';

            // Convert image to Base64 to save it and display it
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                currentImageData = reader.result;

                // Display the image immediately in the digital card shape
                previewCardContainer.innerHTML = `
                    <div class="wallet-card" style="background-image: url('${currentImageData}')">
                        <div class="card-label" id="liveLabel">Analyzing...</div>
                    </div>
                `;
                previewSection.style.display = 'block';
                saveBtn.style.display = 'block';

                // Run Offline AI to guess the card type
                statusText.innerText = "AI scanning for card type (Offline Mode)...";
                try {
                    const result = await Tesseract.recognize(file, 'eng');
                    const text = result.data.text.toUpperCase();
                    
                    if (text.includes("INCOME TAX DEPARTMENT") || text.match(/[A-Z]{5}[0-9]{4}[A-Z]{1}/)) {
                        currentCardType = "PAN Card";
                    } else if (text.includes("GOVERNMENT OF INDIA") || text.match(/\b\d{4}\s\d{4}\s\d{4}\b/)) {
                        currentCardType = "Aadhar Card";
                    } else if (text.includes("ELECTION COMMISSION")) {
                        currentCardType = "Voter ID";
                    } else {
                        currentCardType = "ID Card";
                    }
                    
                    document.getElementById('liveLabel').innerText = currentCardType;
                    statusText.innerText = "Ready to save.";
                } catch (err) {
                    currentCardType = "ID Card";
                    document.getElementById('liveLabel').innerText = currentCardType;
                    statusText.innerText = "Scan complete. (AI offline)";
                }
            };
        });

        // --- SAVING DATA ---
        saveBtn.addEventListener('click', () => {
            if (!currentImageData) return;

            const newCard = {
                id: Date.now(),
                type: currentCardType,
                image: currentImageData
            };

            // Save to IndexedDB
            const transaction = db.transaction(["cards"], "readwrite");
            const store = transaction.objectStore("cards");
            store.add(newCard);

            transaction.oncomplete = function() {
                statusText.innerText = "Saved to Wallet!";
                previewSection.style.display = 'none';
                currentImageData = null;
                loadCardsFromDB(); // Refresh screen
            };
        });

        // --- LOADING DATA ---
        function loadCardsFromDB() {
            walletContainer.innerHTML = '';
            
            const transaction = db.transaction(["cards"], "readonly");
            const store = transaction.objectStore("cards");
            const request = store.getAll();

            request.onsuccess = function() {
                const cards = request.result;
                
                if(cards.length === 0) {
                    walletContainer.innerHTML = '<p style="text-align:center; color: #8E8E93; margin-top: 50px;">Tap + to securely scan your first card.</p>';
                    return;
                }

                // Reverse so newest is on top
                cards.reverse().forEach(card => {
                    walletContainer.innerHTML += `
                        <div class="wallet-card" style="background-image: url('${card.image}')">
                            <div class="card-label">${card.type}</div>
                        </div>
                    `;
                });
            };
        }
    </script>
</body>
</html>
