<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Iris Wallet">
    <title>Iris Wallet</title>
    
    <style>
        :root {
            --ios-bg: #000000;
            --ios-surface: #1c1c1e;
            --ios-accent: #5A32FA;
            --ios-text: #ffffff;
            --ios-text-secondary: #8e8e93;
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }

        /* 1. LOCKDOWN UI (NO SCROLLING/SHIFTING) */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--ios-bg); color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow: hidden; position: fixed; 
            touch-action: none;
        }

        /* 2. MAIN LAYOUT */
        .app-shell {
            display: flex; flex-direction: column; width: 100%; height: 100%;
        }

        .header {
            padding: calc(var(--safe-top) + 20px) 24px 16px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .header h1 { margin: 0; font-size: 34px; font-weight: 700; letter-spacing: -1px; }

        .header-actions { display: flex; gap: 16px; }
        .icon-btn {
            background: var(--ios-surface); border: none; color: var(--ios-accent);
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
        }

        .scroll-container {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 16px 20px 100px; -webkit-overflow-scrolling: touch;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* 3. CARD STACKING & ANIMATION */
        .wallet-stack { display: flex; flex-direction: column; width: 100%; position: relative; }

        .card-wrapper {
            position: relative; width: 100%; margin-bottom: -130px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            perspective: 1000px; z-index: var(--zi);
        }

        .card-wrapper.active { margin-bottom: 20px; transform: translateY(-10px); }
        .card-wrapper.active ~ .card-wrapper { transform: translateY(180px); }

        /* 4. FLIP PHYSICS */
        .card-inner {
            width: 100%; aspect-ratio: 1.586; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 16px;
            padding: 24px; display: flex; flex-direction: column;
            justify-content: space-between; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .card-back { transform: rotateY(180deg); background: #2c2c2e; }

        /* THEMES */
        .theme-pan { background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); color: #1c1c1e; }
        .theme-aadhar { background: #fff; color: #1c1c1e; border-top: 8px solid #E43D30; }
        .theme-credit { background: linear-gradient(135deg, #232526 0%, #414345 100%); color: #fff; }
        .theme-voter { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: #fff; }
        .theme-generic { background: #2c2c2e; color: #fff; }

        /* CARD CONTENT UI */
        .card-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-type-label { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        
        .card-number-display {
            font-family: "SF Mono", monospace; font-size: 24px; letter-spacing: 3px;
            display: flex; align-items: center; gap: 10px; justify-content: center;
        }
        
        .copy-btn {
            background: rgba(255,255,255,0.15); border: none; padding: 6px;
            border-radius: 6px; cursor: pointer; color: inherit; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
        }

        .card-info-group { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 9px; font-weight: 600; text-transform: uppercase; opacity: 0.6; }
        .info-value { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        /* 5. OVERLAY UI */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; padding: var(--safe-top) 24px;
        }
        .overlay.active { display: flex; }

        .scanner-instruction { text-align: center; font-size: 20px; font-weight: 600; margin: 40px 0; }
        
        .camera-trigger {
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
            margin: auto auto 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .camera-trigger div { width: 64px; height: 64px; background: #fff; border-radius: 50%; }

        .status-pill {
            background: var(--ios-accent); color: white; padding: 12px 24px;
            border-radius: 24px; font-weight: 600; text-align: center;
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: none; box-shadow: 0 10px 30px rgba(90, 50, 250, 0.4);
            z-index: 3000;
        }

        #videoViewfinder {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="header">
            <h1>Iris Wallet</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleKey()">🔑</button>
                <div class="add-btn-container">
                    <button class="icon-btn" onclick="startScanning()">＋</button>
                </div>
            </div>
        </header>

        <div class="scroll-container" id="scrollContainer">
            <div id="walletStack" class="wallet-stack"></div>
        </div>
    </div>

    <!-- SCANNER OVERLAY -->
    <div id="scannerOverlay" class="overlay">
        <div style="display:flex; justify-content: flex-end;">
            <button class="icon-btn" onclick="closeScanner()" style="background:none; font-size: 30px; color: white;">✕</button>
        </div>
        <div id="scanStepText" class="scanner-instruction">Scan Front of Card</div>
        
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="scanPreview" style="width:100%; aspect-ratio:1.586; border: 2px solid var(--ios-accent); border-radius:16px; background: #000; display:flex; align-items:center; justify-content:center; overflow:hidden; position: relative;">
                <video id="videoViewfinder" autoplay playsinline muted></video>
                <canvas id="snapshotCanvas" style="display:none;"></canvas>
            </div>
        </div>

        <div class="camera-trigger" onclick="captureSnapshot()">
            <div></div>
        </div>
    </div>

    <div id="statusPill" class="status-pill">Processing...</div>

    <script>
        const statusPill = document.getElementById('statusPill');
        const walletStack = document.getElementById('walletStack');
        const scannerOverlay = document.getElementById('scannerOverlay');
        const scanStepText = document.getElementById('scanStepText');
        const video = document.getElementById('videoViewfinder');
        const canvas = document.getElementById('snapshotCanvas');

        let db;
        let scanSession = { step: 0, front: null, back: null };
        let activeCardId = null;
        let stream = null;

        // 1. DATABASE INIT
        const req = indexedDB.open("IrisWalletV2", 1);
        req.onupgradeneeded = e => {
            e.target.result.createObjectStore("cards", { keyPath: "id" });
        };
        req.onsuccess = e => { db = e.target.result; renderWallet(); };

        // 2. API KEY HELPERS
        function toggleKey() {
            const currentKey = localStorage.getItem('iris_key');
            const key = prompt("Enter Gemini API Key:", currentKey || "");
            if(key !== null) {
                localStorage.setItem('iris_key', key.trim());
                showStatus("Gemini Model Connected");
            }
        }

        // 3. SCANNING FLOW
        async function startScanning() {
            if(!localStorage.getItem('iris_key')) return toggleKey();
            
            scanSession = { step: 0, front: null, back: null };
            scanStepText.innerText = "Scan Front of Card";
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                scannerOverlay.classList.add('active');
            } catch (err) {
                showStatus("Camera access denied.");
                console.error(err);
            }
        }

        function closeScanner() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            scannerOverlay.classList.remove('active');
        }

        function captureSnapshot() {
            // Set canvas dimensions to match video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            if(scanSession.step === 0) {
                scanSession.front = imageData;
                scanSession.step = 1;
                scanStepText.innerText = "Scan Back of Card";
                showStatus("Front Captured");
            } else {
                scanSession.back = imageData;
                processCard();
            }
        }

        async function processCard() {
            const frontImage = scanSession.front;
            const backImage = scanSession.back;
            closeScanner();
            showStatus("Analyzing with Gemini AI...");
            
            const apiKey = localStorage.getItem('iris_key');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract card data into JSON. Reply ONLY with JSON. Keys: type(PAN, Aadhar, Credit, Voter, ID), number, name, dob, expiry. Use NULL if missing." },
                                { inline_data: { mime_type: "image/jpeg", data: frontImage.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const res = await response.json();
                if (!res.candidates) throw new Error("API Limit or Key Error");
                
                let jsonText = res.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const data = JSON.parse(jsonText);

                const newCard = {
                    id: Date.now(),
                    ...data,
                    frontImg: frontImage,
                    backImg: backImage
                };

                const tx = db.transaction("cards", "readwrite");
                tx.objectStore("cards").add(newCard);
                tx.oncomplete = () => {
                    showStatus("Card Added Successfully");
                    renderWallet();
                };
            } catch (err) {
                console.error(err);
                showStatus("Scanning Failed. Try again.");
            }
        }

        // 4. RENDERING & UI LOGIC
        function renderWallet() {
            walletStack.innerHTML = '';
            const tx = db.transaction("cards", "readonly");
            tx.objectStore("cards").getAll().onsuccess = e => {
                const cards = e.target.result.reverse();
                if(cards.length === 0) {
                    walletStack.innerHTML = `<div style="text-align:center; padding-top:100px; color:var(--ios-text-secondary)">Your wallet is empty.<br>Tap + to scan a card.</div>`;
                    return;
                }
                cards.forEach((c, idx) => {
                    const cardTheme = getThemeClass(c.type);
                    const el = document.createElement('div');
                    el.className = 'card-wrapper';
                    el.style.setProperty('--zi', cards.length - idx);
                    el.innerHTML = `
                        <div class="card-inner" onclick="handleCardClick(this, ${c.id})">
                            <div class="card-front ${cardTheme}">
                                <div class="card-row">
                                    <div class="card-type-label">${c.type}</div>
                                    <div style="font-size:24px">✦</div>
                                </div>
                                <div class="card-number-display">
                                    ${c.number || '•••• •••• ••••'}
                                    <button class="copy-btn" onclick="copyText('${c.number}', event)">📋</button>
                                </div>
                                <div class="card-row">
                                    <div class="card-info-group">
                                        <div class="info-label">Card Holder</div>
                                        <div class="info-value">
                                            ${c.name || 'CITIZEN'}
                                            <button class="copy-btn" onclick="copyText('${c.name}', event)">📋</button>
                                        </div>
                                    </div>
                                    <div class="card-info-group" style="text-align:right">
                                        <div class="info-label">Expiry / DOB</div>
                                        <div class="info-value">${c.expiry || c.dob || '--/--'}</div>
                                    </div>
                                </div>
                                <div onclick="deleteCard(${c.id}, event)" style="position:absolute; bottom:10px; right:15px; opacity:0.4; font-size:11px; color:inherit; font-weight:bold;">✕ REMOVE</div>
                            </div>
                            <div class="card-back" style="background-image:url(${c.backImg}); background-size:cover; background-position:center;">
                                <div style="background:rgba(0,0,0,0.4); width:100%; height:100%; padding:20px; backdrop-filter:blur(4px); display:flex; flex-direction:column; justify-content:center; align-items:center;">
                                    <div class="card-type-label" style="color:white; margin-bottom:10px;">REVERSE SIDE</div>
                                    <div style="font-size:12px; opacity:0.9; text-align:center;">Tapping while active flips the card.</div>
                                </div>
                            </div>
                        </div>
                    `;
                    walletStack.appendChild(el);
                });
            };
        }

        function handleCardClick(inner, id) {
            const wrapper = inner.parentElement;
            
            if(wrapper.classList.contains('active')) {
                if(activeCardId === id) {
                    wrapper.classList.toggle('flipped');
                } else {
                    activeCardId = id;
                }
            } else {
                document.querySelectorAll('.card-wrapper').forEach(w => w.classList.remove('active', 'flipped'));
                wrapper.classList.add('active');
                activeCardId = id;
            }
        }

        function deleteCard(id, e) {
            e.stopPropagation();
            if(!confirm("Delete this card permanently?")) return;
            const tx = db.transaction("cards", "readwrite");
            tx.objectStore("cards").delete(id);
            tx.oncomplete = () => renderWallet();
        }

        function getThemeClass(type) {
            const t = String(type).toLowerCase();
            if(t.includes('pan')) return 'theme-pan';
            if(t.includes('aadhar')) return 'theme-aadhar';
            if(t.includes('credit')) return 'theme-credit';
            if(t.includes('voter')) return 'theme-voter';
            return 'theme-generic';
        }

        function copyText(text, e) {
            e.stopPropagation();
            const el = document.createElement('textarea');
            el.value = text;
            el.setAttribute('readonly', '');
            el.style.position = 'absolute';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showStatus("Copied to clipboard");
        }

        function showStatus(msg) {
            statusPill.innerText = msg;
            statusPill.style.display = 'block';
            setTimeout(() => { statusPill.style.display = 'none'; }, 2500);
        }

        // PREVENT BOUNCY SCROLLING ON IOS EXCEPT SCROLL CONTAINER
        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('#scrollContainer')) return;
            e.preventDefault();
        }, { passive: false });

    </script>
</body>
</html>
