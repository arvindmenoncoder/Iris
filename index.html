<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Iris Wallet">
    <title>Iris Wallet</title>
    
    <style>
        :root {
            --iris-primary: #5A32FA;
            --bg-black: #000000;
            --surface-gray: #1C1C1E;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black); color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden; overscroll-behavior-y: none; position: fixed;
        }

        .app-container {
            width: 100%; height: 100%;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding-bottom: 80px;
        }

        .header {
            padding: calc(env(safe-area-inset-top, 47px) + 20px) 24px 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .header h1 { margin: 0; font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }

        .header-actions { display: flex; gap: 15px; align-items: center; }
        
        .reset-key-btn { background: none; border: none; color: #8E8E93; font-size: 20px; cursor: pointer; padding: 5px; }

        .add-btn-container { position: relative; }
        .add-btn {
            background: var(--surface-gray); color: var(--iris-primary);
            width: 36px; height: 36px; border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: 500; cursor: pointer;
        }
        input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .content { padding: 24px; }
        #status { font-size: 14px; color: #8E8E93; text-align: center; margin-bottom: 20px; min-height: 20px; font-weight: 500; }

        #walletContainer { display: flex; flex-direction: column; padding-top: 10px; }

        .swipe-wrapper {
            position: relative; width: 100%; margin-bottom: -110px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .swipe-wrapper:last-child { margin-bottom: 40px; }
        .swipe-wrapper.expanded { transform: translateY(-20px); margin-bottom: 20px; z-index: 50; }

        .delete-btn {
            position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
            background-color: #FF3B30; color: white; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            border-radius: 16px; z-index: 1; opacity: 0;
        }

        .wallet-card {
            width: 100%; aspect-ratio: 1.586; border-radius: 16px; padding: 24px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; z-index: 2; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
            background-size: cover; background-position: center; transition: transform 0.3s;
        }

        /* Card Themes */
        .theme-pan { background: linear-gradient(135deg, #E0EAFC, #CFDEF3); color: #1a1a1a; }
        .theme-aadhar { background: linear-gradient(135deg, #ffffff, #f0f0f0); color: #1a1a1a; border-top: 6px solid #E43D30; }
        .theme-credit { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; }
        .theme-voter { background: linear-gradient(135deg, #e6f2ff, #b3d9ff); color: #1a1a1a; }
        .theme-generic { background: linear-gradient(135deg, #2c2c2e, #1c1c1e); color: white; }

        .card-title { font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .card-number { font-size: 24px; font-family: "SF Mono", monospace; letter-spacing: 2px; text-align: center; margin: 20px 0; }
        .card-value { font-size: 16px; font-weight: 500; text-transform: uppercase; }

        .btn-primary { 
            background: var(--iris-primary); color: white; width: 100%; padding: 16px; 
            border-radius: 14px; font-size: 17px; font-weight: 600; border: none; 
            margin-top: 20px; cursor: pointer; display: none; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Iris Wallet</h1>
            <div class="header-actions">
                <button class="reset-key-btn" id="resetKeyBtn" title="Manage API Key">🔑</button>
                <div class="add-btn-container">
                    <div class="add-btn">+</div>
                    <input type="file" accept="image/*" capture="environment" id="cameraInput">
                </div>
            </div>
        </div>

        <div class="content">
            <div id="status"></div>
            
            <div id="previewSection" style="display:none; margin-bottom: 40px;">
                <div id="previewCardContainer"></div>
                <button id="saveBtn" class="btn-primary">Add to Wallet</button>
            </div>

            <div id="walletContainer"></div>
        </div>
    </div>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const statusText = document.getElementById('status');
        const previewSection = document.getElementById('previewSection');
        const previewCardContainer = document.getElementById('previewCardContainer');
        const saveBtn = document.getElementById('saveBtn');
        const walletContainer = document.getElementById('walletContainer');

        let currentCardData = null;

        // --- 1. SECURE API KEY MANAGEMENT ---
        function checkApiKeyOnLoad() {
            const key = localStorage.getItem('iris_gemini_key');
            if (!key) {
                promptForKey();
            }
        }

        function promptForKey() {
            const newKey = prompt("Please enter your Gemini API Key to enable scanning:");
            if (newKey && newKey.trim().length > 10) {
                localStorage.setItem('iris_gemini_key', newKey.trim());
                statusText.innerText = "API Key Saved.";
                setTimeout(() => { statusText.innerText = ""; }, 2000);
            } else {
                statusText.innerText = "API Key Required for Scanning.";
            }
        }

        document.getElementById('resetKeyBtn').addEventListener('click', () => {
            const existingKey = localStorage.getItem('iris_gemini_key');
            if (existingKey) {
                if (confirm("Remove saved API Key from this device?")) {
                    localStorage.removeItem('iris_gemini_key');
                    statusText.innerText = "Key Removed.";
                    location.reload();
                }
            } else {
                promptForKey();
            }
        });

        // Run check on start
        window.addEventListener('load', checkApiKeyOnLoad);

        // --- 2. DATABASE LOGIC ---
        let db;
        const dbReq = indexedDB.open("IrisWalletDB", 5);
        dbReq.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("digital_cards")) {
                db.createObjectStore("digital_cards", { keyPath: "id" });
            }
        };
        dbReq.onsuccess = e => { db = e.target.result; loadWallet(); };

        // --- 3. SCANNING LOGIC ---
        cameraInput.addEventListener('change', async (event) => {
            const apiKey = localStorage.getItem('iris_gemini_key');
            if (!apiKey) {
                promptForKey();
                return;
            }

            const file = event.target.files[0];
            if (!file) return;

            statusText.innerText = "Analyzing with Gemini AI...";
            previewSection.style.display = 'none';

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                
                // Show temporary photo preview
                previewCardContainer.innerHTML = `<div class="wallet-card" style="background-image: url('${reader.result}')"></div>`;
                previewSection.style.display = 'block';

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Extract card details. Return ONLY valid JSON: { \"type\": \"PAN Card\"|\"Aadhar Card\"|\"Credit Card\"|\"Voter ID\", \"number\": \"string\", \"name\": \"string\" }" },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error("API Connection Error");

                    const result = await response.json();
                    let jsonText = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                    const parsed = JSON.parse(jsonText);

                    currentCardData = {
                        id: Date.now(),
                        type: parsed.type || "ID Card",
                        number: parsed.number || "Unknown",
                        name: parsed.name || "Unknown Name",
                        theme: getTheme(parsed.type),
                        icon: getIcon(parsed.type)
                    };

                    previewCardContainer.innerHTML = generateCardHTML(currentCardData);
                    saveBtn.style.display = 'block';
                    statusText.innerText = "Scan Successful!";
                } catch (e) {
                    statusText.innerText = "Error: Check your key or photo quality.";
                }
            };
        });

        function getTheme(t) {
            t = (t || "").toLowerCase();
            if(t.includes('pan')) return 'theme-pan';
            if(t.includes('aadhar')) return 'theme-aadhar';
            if(t.includes('credit') || t.includes('debit')) return 'theme-credit';
            if(t.includes('voter')) return 'theme-voter';
            return 'theme-generic';
        }

        function getIcon(t) {
            t = (t || "").toLowerCase();
            if(t.includes('pan')) return '🇮🇳';
            if(t.includes('aadhar')) return '🦁';
            if(t.includes('voter')) return '🗳️';
            return '💳';
        }

        function generateCardHTML(c) {
            return `
                <div class="wallet-card ${c.theme}">
                    <div class="card-header"><div class="card-title">${c.type}</div><div>${c.icon}</div></div>
                    <div class="card-body"><div class="card-number">${c.number}</div></div>
                    <div class="card-footer">
                        <div><div style="font-size:10px; opacity:0.7;">HOLDER</div><div class="card-value">${c.name}</div></div>
                    </div>
                </div>`;
        }

        saveBtn.addEventListener('click', () => {
            const tx = db.transaction("digital_cards", "readwrite");
            tx.objectStore("digital_cards").add(currentCardData);
            tx.oncomplete = () => {
                previewSection.style.display = 'none';
                statusText.innerText = "Added to Wallet";
                setTimeout(() => { statusText.innerText = ""; }, 2000);
                loadWallet();
            };
        });

        function loadWallet() {
            walletContainer.innerHTML = '';
            const tx = db.transaction("digital_cards", "readonly");
            tx.objectStore("digital_cards").getAll().onsuccess = e => {
                const cards = e.target.result.reverse();
                if(cards.length === 0) {
                    walletContainer.innerHTML = '<p style="text-align:center; color:#8E8E93; margin-top:40px;">Your wallet is empty.</p>';
                }
                cards.forEach((c, i) => {
                    const w = document.createElement('div');
                    w.className = 'swipe-wrapper';
                    w.style.zIndex = cards.length - i;
                    w.innerHTML = `<div class="delete-btn" onclick="deleteCard(${c.id})">Delete</div>${generateCardHTML(c)}`;
                    walletContainer.appendChild(w);
                    applySwipe(w);
                });
            };
        }

        function deleteCard(id) {
            const tx = db.transaction("digital_cards", "readwrite");
            tx.objectStore("digital_cards").delete(id);
            tx.oncomplete = () => loadWallet();
        }

        function applySwipe(w) {
            const card = w.querySelector('.wallet-card');
            const del = w.querySelector('.delete-btn');
            let start = 0;
            card.addEventListener('touchstart', e => start = e.touches[0].clientX);
            card.addEventListener('touchmove', e => {
                let diff = start - e.touches[0].clientX;
                if (diff > 20 && diff < 100) { card.style.transform = `translateX(-${diff}px)`; del.style.opacity = diff/100; }
            });
            card.addEventListener('touchend', e => {
                let diff = start - e.changedTouches[0].clientX;
                if (diff > 50) { card.style.transform = 'translateX(-90px)'; del.style.opacity = 1; }
                else { card.style.transform = 'translateX(0)'; del.style.opacity = 0; }
            });
            card.addEventListener('click', () => w.classList.toggle('expanded'));
        }
    </script>
</body>
</html>
